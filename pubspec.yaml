name: changaya
description: Marketplace de servicios locales para la provincia de Formosa, Argentina.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0
  firebase_storage: ^13.2.0
  firebase_messaging: ^16.1.3
  firebase_analytics: ^12.2.0
  firebase_crashlytics: ^5.1.0
  firebase_performance: ^0.11.2

  # Estado
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2

  # Navegación
  go_router: ^17.2.0

  # Formularios
  flutter_form_builder: ^10.3.0+2
  form_builder_validators: ^11.3.0

  # Imágenes
  cached_network_image: ^3.3.0
  image_picker: ^1.0.0
  flutter_image_compress: ^2.1.0

  # Mapas (OpenStreetMap — sin billing)
  flutter_map: ^8.2.2
  latlong2: ^0.9.0

  # Geolocalización (opt-in)
  geolocator: ^14.0.2

  # Notificaciones
  flutter_local_notifications: ^21.0.0

  # Autenticación
  google_sign_in: ^6.2.0

  # UI
  google_fonts: ^8.0.2

  # Storage local
  shared_preferences: ^2.2.0

  # Utilidades
  # intl: versión resuelta transitivamente por flutter_localizations (SDK pined to 0.20.2)
  timeago: ^3.6.0
  url_launcher: ^6.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mockito: ^5.4.0
  build_runner: ^2.4.0
  riverpod_generator: ^4.0.3

flutter:
  uses-material-design: true
