name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy-firebase:
    name: Deploy to Firebase (Production)
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json

      - name: Install Functions dependencies
        run: cd functions && npm ci

      - name: Build Functions
        run: cd functions && npm run build

      - name: Setup Flutter (for web build)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Build Flutter Web (admin panel)
        run: flutter build web --release -t lib/main_prod.dart

      - name: Deploy to Firebase
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PROD }}
          projectId: ${{ secrets.FIREBASE_PROJECT_ID_PROD }}
          channelId: live
        env:
          FIREBASE_CLI_EXPERIMENTS: webframeworks

      - name: Deploy Functions & Rules
        run: |
          npm install -g firebase-tools
          firebase deploy --only functions,firestore:rules,storage:rules \
            --project ${{ secrets.FIREBASE_PROJECT_ID_PROD }} \
            --token ${{ secrets.FIREBASE_TOKEN }}
